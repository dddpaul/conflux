<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conflux</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #172b4d;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn-group button {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #export-btn {
      color: #fff;
      background: #0052cc;
    }

    #export-btn:hover:not(:disabled) {
      background: #0065ff;
    }

    #export-btn:active:not(:disabled) {
      background: #0747a6;
    }

    #copy-btn {
      color: #172b4d;
      background: #f4f5f7;
      border: 1px solid #dfe1e6;
    }

    #copy-btn:hover:not(:disabled) {
      background: #ebecf0;
    }

    #copy-btn:active:not(:disabled) {
      background: #dfe1e6;
    }

    .btn-group button:disabled {
      background: #dfe1e6;
      color: #a5adba;
      cursor: default;
      border-color: transparent;
    }

    .status-copied {
      color: #006644;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.4;
      min-height: 20px;
    }

    .status-idle {
      color: #6b778c;
    }

    .status-loading {
      color: #0052cc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-done {
      color: #006644;
    }

    .status-error {
      color: #de350b;
    }

    .status-disabled {
      color: #6b778c;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0052cc;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Conflux</h1>
  <div class="btn-group">
    <button id="export-btn" disabled>Export</button>
    <button id="copy-btn" disabled>Copy</button>
  </div>
  <div id="status" class="status-idle"></div>
  <div style="margin-top: 10px; text-align: right;">
    <a href="options.html" target="_blank" style="color: #6b778c; font-size: 12px; text-decoration: none;">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
